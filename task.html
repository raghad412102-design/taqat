<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Task App</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" 
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="style.css">

</head>


<body class="bg-gray-100">


<nav class="bg-gray-900 text-white px-8 py-4 flex justify-between items-center">

    <h1 class="text-2xl font-bold">
        Task App
    </h1>


    <a href="index.html" class="hover:text-blue-400 transition">
        <i class="fa-solid fa-house"></i>
        Home
    </a>

</nav>



<section class="min-h-screen flex justify-center items-center px-6">


<div class="bg-white max-w-xl w-full p-8 rounded-xl shadow-lg">


    <h2 class="text-3xl font-bold text-center mb-6">
        Daily Tasks
    </h2>



    <div class="flex gap-3">


        <input 
        id="taskInput"
        type="text"
        placeholder="Add new task..."
        class="border p-3 rounded-lg flex-1 outline-none">


        <button 
        id="addBtn"
        class="bg-blue-600 text-white px-5 rounded-lg hover:bg-blue-700 transition">

            <i class="fa-solid fa-plus"></i>

        </button>


    </div>



    <ul id="taskList" class="mt-6 space-y-3">


    </ul>



</div>


</section>


<script src="js/task.js"></script>


</body>

</html>
