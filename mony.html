<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Shopping App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-gray-100 min-h-screen flex flex-col font-sans">

    <nav class="bg-gray-900 text-white px-8 py-4 flex justify-between items-center shadow-md">
        <h1 id="navTitle" class="text-2xl font-bold tracking-wide">Smart Shopping</h1>
        
        <div class="flex items-center gap-4">
            <button id="langBtn" class="bg-gray-800 hover:bg-gray-700 text-sm px-3 py-1.5 rounded-lg border border-gray-700 transition flex items-center gap-2">
                <i class="fa-solid fa-language text-lg"></i>
                <span id="langText">العربية</span>
            </button>
            <a href="index.html" class="hover:text-blue-400 transition flex items-center gap-2">
                <i class="fa-solid fa-house"></i> <span id="navHome">Home</span>
            </a>
        </div>
    </nav>

    <main class="flex-grow flex justify-center items-center px-6 py-10">
        <div class="bg-white max-w-2xl w-full p-8 rounded-xl shadow-lg">
            
            <h2 id="mainTitle" class="text-3xl font-bold text-center mb-8 text-gray-800">
                Smart Budget Shopping
            </h2>

            <div class="mb-6">
                <label id="budgetLabel" for="income" class="font-bold text-gray-700 block mb-2">Total Budget (Available Money)</label>
                <input 
                    id="income"
                    type="number"
                    placeholder="Enter your available budget"
                    class="w-full border border-gray-300 p-3 rounded-lg outline-none focus:border-blue-500 transition"
                >
            </div>

            <div class="border-t pt-4">
                <h3 id="listTitle" class="font-bold text-gray-700 mb-3">Shopping List</h3>
                
                <div id="itemsContainer" class="space-y-3">
                    <div class="item-row grid grid-cols-12 gap-2 items-center">
                        <input type="number" placeholder="Price" class="item-price col-span-4 border border-gray-300 p-2 rounded-lg text-center outline-none focus:border-green-500">
                        <input type="text" placeholder="Item Name (e.g., Shirt)" class="item-name col-span-7 border border-gray-300 p-2 rounded-lg outline-none focus:border-green-500">
                        <button type="button" onclick="this.parentElement.remove()" class="col-span-1 text-red-500 hover:text-red-700 text-center text-lg">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                </div>

                <button 
                    id="addItemBtn"
                    type="button"
                    class="mt-3 text-sm flex items-center gap-1 bg-gray-200 hover:bg-gray-300 text-gray-700 px-3 py-1.5 rounded-lg transition"
                >
                    <i class="fa-solid fa-plus"></i> <span id="addItemText">Add Another Item</span>
                </button>
            </div>

            <button 
                id="calculateBtn"
                class="mt-6 w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 transition flex items-center justify-center gap-2 font-semibold shadow-md"
            >
                <i class="fa-solid fa-calculator"></i> <span id="calcBtnText">Calculate Total</span>
            </button>

            <div class="mt-8 grid sm:grid-cols-3 gap-4 text-center">
                <div class="bg-green-100 p-4 rounded-lg border border-green-200">
                    <h4 id="cardBudget" class="font-bold text-green-800">Budget</h4>
                    <p id="showIncome" class="text-xl font-semibold mt-1 text-green-900">0</p>
                </div>

                <div class="bg-blue-100 p-4 rounded-lg border border-blue-200">
                    <h4 id="cardSpent" class="font-bold text-blue-800">Total Spent</h4>
                    <p id="showExpense" class="text-xl font-semibold mt-1 text-blue-900">0</p>
                </div>

                <div id="resultBox" class="bg-gray-100 p-4 rounded-lg border border-gray-200 transition-colors duration-300">
                    <h4 id="resultLabel" class="font-bold text-gray-800">Remaining</h4>
                    <p id="remaining" class="text-xl font-semibold mt-1 text-gray-900">0</p>
                </div>
            </div>

            <div id="messageContainer" class="mt-6 p-4 rounded-lg border hidden transition-all duration-300">
                <p id="message" class="font-bold text-lg mb-2"></p>
                <div id="suggestions" class="text-sm space-y-1 text-gray-700"></div>
            </div>

        </div>
    </main>

    <script src="js/mony.js"></script>
</body>
</html>
